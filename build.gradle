import org.jetbrains.gradle.ext.Gradle

plugins {
    id 'java'
    id 'java-library'
    id 'maven-publish'
    id 'com.gradleup.shadow' version '9.4.1'
    id 'org.jetbrains.gradle.plugin.idea-ext' version '1.4.1'
    id 'xyz.wagyourtail.unimined' version '1.4.18-kappa'
    id 'net.kyori.blossom' version '2.2.0'
}

apply from: 'gradle/scripts/helpers.gradle'

assertProperty 'mod_version'
assertProperty 'root_package'
assertProperty 'mod_id'
assertProperty 'mod_name'
assertSubProperties 'use_access_transformer', 'access_transformer_locations'
assertSubProperties 'is_coremod', 'coremod_includes_mod', 'coremod_plugin_class_name'

setDefaultProperty 'generate_sources_jar', true, true
setDefaultProperty 'generate_javadocs_jar', true, false
setDefaultProperty 'minecraft_username', true, 'Developer'
setDefaultProperty 'extra_jvm_args', false, ''

version = propertyString('mod_version')
group = propertyString('root_package')

base {
    archivesName = propertyString('mod_name')
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
    if (propertyBool('generate_sources_jar')) {
        withSourcesJar()
    }
    if (propertyBool('generate_javadocs_jar')) {
        withJavadocJar()
    }
}

configurations {
    contain
    implementation.extendsFrom(contain)
    modCompileOnly
    compileOnly.extendsFrom(modCompileOnly)
    modRuntimeOnly
    runtimeOnly.extendsFrom(modRuntimeOnly)
}

def embeddedLibraryProjects = [
    project(':GTNHLib'),
    project(':glsm'),
    project(':celeritas-common')
]

def mergedEmbeddedLibraryClassesDir = layout.buildDirectory.dir('embedded-library-classes/main')

ext.sharedMinecraftCompileClasspath = {
    rootProject.files(rootProject.provider {
        rootProject.tasks.named('compileJava', JavaCompile).get().classpath.files.findAll { it.isFile() }
    })
}

def mergeEmbeddedLibraryClasses = tasks.register('mergeEmbeddedLibraryClasses', Sync) {
    duplicatesStrategy = DuplicatesStrategy.FAIL
    dependsOn tasks.named('compileJava')
    dependsOn embeddedLibraryProjects.collect { it.tasks.named('classes') }
    into mergedEmbeddedLibraryClassesDir

    embeddedLibraryProjects.each { libraryProject ->
        from(libraryProject.sourceSets.main.output)
    }
}

sourceSets {
    main {
        java {
            srcDir 'shader/src/main/java'
        }
    }
}

sourceSets.main.output.dir(mergedEmbeddedLibraryClassesDir, builtBy: mergeEmbeddedLibraryClasses)

subprojects {
    apply plugin: 'java-library'
    group = rootProject.group
    version = rootProject.version

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    dependencies {
        compileOnly rootProject.ext.sharedMinecraftCompileClasspath()
        annotationProcessor rootProject.files(rootProject.provider {
            rootProject.configurations.annotationProcessor.files.findAll { it.isFile() }
        })
    }

    tasks.withType(JavaCompile).configureEach {
        sourceCompatibility = '21'
        targetCompatibility = '21'
        options.encoding = 'UTF-8'
        options.release.set(21)
        javaCompiler = javaToolchains.compilerFor {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    tasks.withType(Javadoc).configureEach {
        failOnError = false
    }
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.cleanroommc.com' }
    maven { url = 'https://cursemaven.com' }
    maven { url = 'https://api.modrinth.com/maven' }
    maven { url = 'https://nexus.gtnewhorizons.com/repository/public/' }
    mavenLocal()
}

dependencies {
    compileOnly project(':celeritas-common')

    contain('org.taumc:glsl-transformation-lib:0.2.0-32.g7dd88a4-GTNH') {
        transitive = false
        exclude module: 'antlr4'
    }
    contain 'org.antlr:antlr4-runtime:4.13.2'
}

def actiniumProjectAccessTransformer = propertyBool('use_access_transformer')
    ? rootProject.projectDir.toPath().resolve("src/main/resources/${propertyString('access_transformer_locations')}").toFile()
    : null

unimined.minecraft {
    version '1.12.2'

    mappings {
        mcp 'stable', '39-1.12'
    }

    cleanroom {
        if (actiniumProjectAccessTransformer != null) {
            accessTransformer actiniumProjectAccessTransformer.absolutePath
        }

        loader '0.5.12-alpha'

        runs.all {
            args += ['--username', propertyString('minecraft_username')]
            def extraArgs = propertyString('extra_jvm_args')
            if (extraArgs != null && !extraArgs.trim().isEmpty()) {
                jvmArgs += extraArgs.split('\\s+').toList()
            }
            if (propertyBool('is_coremod')) {
                systemProperty 'fml.coreMods.load', propertyString('coremod_plugin_class_name')
            }
        }
    }

    defaultRemapJar = false

    remap(tasks.named('jar').get()) {
        mixinRemap {
            enableBaseMixin()
            enableMixinExtra()
        }
    }

    mods {
        remap(configurations.modCompileOnly)
        remap(configurations.modRuntimeOnly)
    }
}

apply from: 'gradle/scripts/dependencies.gradle'

processResources {
    def resourceProperties = [
        mod_id         : propertyString('mod_id'),
        mod_name       : propertyString('mod_name'),
        mod_version    : propertyString('mod_version'),
        mod_description: propertyString('mod_description'),
        mod_authors    : propertyString('mod_authors'),
        mod_credits    : propertyString('mod_credits'),
        mod_url        : propertyString('mod_url'),
        mod_update_json: propertyString('mod_update_json'),
        mod_logo_path  : propertyString('mod_logo_path')
    ]

    inputs.properties(resourceProperties)
    filteringCharset = 'UTF-8'

    filesMatching(['mcmod.info', 'pack.mcmeta']) {
        expand(resourceProperties)
        filter { line ->
            resourceProperties.inject(line) { acc, entry ->
                acc.replace("{{ ${entry.key} }}", entry.value).replace("{{${entry.key}}}", entry.value)
            }
        }
    }
}

tasks.named('sourcesJar').configure {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    embeddedLibraryProjects.each { libraryProject ->
        from(libraryProject.sourceSets.main.allSource)
    }
}

tasks.named('classes').configure {
    dependsOn mergeEmbeddedLibraryClasses
}

tasks.named('javadoc').configure {
    failOnError = false
    embeddedLibraryProjects.each { libraryProject ->
        source += libraryProject.sourceSets.main.allJava
        classpath += libraryProject.sourceSets.main.compileClasspath + libraryProject.sourceSets.main.output
    }
}

idea {
    module {
        inheritOutputDirs = true
    }
    project {
        settings {
            runConfigurations {
                '1. Build'(Gradle) {
                    taskNames = ['build']
                }
                '2. Run Client'(Gradle) {
                    taskNames = ['runClient']
                }
                '3. Run Server'(Gradle) {
                    taskNames = ['runServer']
                }
            }
            compiler.javac {
                afterEvaluate {
                    javacAdditionalOptions = '-encoding utf8'
                }
            }
        }
    }
}

jar {
    duplicatesStrategy = DuplicatesStrategy.FAIL

    if (configurations.contain.size() > 0) {
        into('/') {
            from configurations.contain
        }
    }

    doFirst {
        manifest {
            def attributeMap = [
                ModType: 'CRL'
            ]
            if (configurations.contain.size() > 0) {
                attributeMap['ContainedDeps'] = configurations.contain.collect { it.name }.join(' ')
                attributeMap['NonModDeps'] = true
            }
            if (propertyBool('is_coremod')) {
                attributeMap['FMLCorePlugin'] = propertyString('coremod_plugin_class_name')
                attributeMap['ForceLoadAsMod'] = 'true'
                if (propertyBool('coremod_includes_mod')) {
                    attributeMap['FMLCorePluginContainsFMLMod'] = true
                }
            }
            if (propertyBool('use_access_transformer')) {
                attributeMap['FMLAT'] = propertyString('access_transformer_locations').tokenize('/\\').last()
            }
            attributes(attributeMap)
        }
    }

    finalizedBy tasks.named('remapJar')
}

tasks.named('remapJar').configure {
    doFirst {
        logging.captureStandardOutput LogLevel.INFO
    }
    doLast {
        logging.captureStandardOutput LogLevel.QUIET
    }
}

tasks.withType(JavaCompile).configureEach {
    sourceCompatibility = '21'
    targetCompatibility = '21'
    options.encoding = 'UTF-8'
    options.release.set(21)
    javaCompiler = javaToolchains.compilerFor {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

test {
    useJUnitPlatform()
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(25)
    }
    if (propertyBool('show_testing_output')) {
        testLogging {
            showStandardStreams = true
        }
    }
}

tasks.named('processResources').configure {
    from('THIRD_PARTY_NOTICES.md')
}

def verifyRemapJar = tasks.register('verifyRemapJar') {
    dependsOn tasks.named('remapJar')
    def remapOutput = tasks.named('remapJar').flatMap { it.archiveFile }
    inputs.file(remapOutput)

    doLast {
        def archive = zipTree(remapOutput.get().asFile)
        def requiredEntries = [
            'META-INF/MANIFEST.MF',
            'THIRD_PARTY_NOTICES.md',
            'com/dhj/actinium/Actinium.class',
            'com/gtnewhorizons/angelica/glsm/GLStateManager.class',
            'net/coderbot/iris/Iris.class',
            'org/embeddedt/embeddium/impl/render/chunk/RenderSectionManager.class',
            'mixins.actinium.iris.json',
            'mixins.actinium.vintage.json',
            'META-INF/services/com.gtnewhorizons.angelica.glsm.backend.RenderBackend'
        ]

        requiredEntries.each { entry ->
            if (archive.matching { include entry }.isEmpty()) {
                throw new GradleException("Remapped mod jar is missing required entry: ${entry}")
            }
        }

        def manifest = new java.util.jar.JarFile(remapOutput.get().asFile).withCloseable {
            it.manifest.mainAttributes
        }
        if (manifest.getValue('FMLCorePlugin') != propertyString('coremod_plugin_class_name')) {
            throw new GradleException('Remapped mod jar has an invalid FMLCorePlugin manifest entry')
        }
        if (manifest.getValue('FMLAT') != propertyString('access_transformer_locations').tokenize('/\\').last()) {
            throw new GradleException('Remapped mod jar has an invalid FMLAT manifest entry')
        }
    }
}

def verifyModuleBoundaries = tasks.register('verifyModuleBoundaries') {
    dependsOn tasks.named('compileJava')
    dependsOn embeddedLibraryProjects.collect { it.tasks.named('classes') }

    doLast {
        def componentOutputs = [
            actinium: files(tasks.named('compileJava', JavaCompile).get().destinationDirectory),
            GTNHLib: project(':GTNHLib').sourceSets.main.output.classesDirs,
            glsm: project(':glsm').sourceSets.main.output.classesDirs,
            celeritas: project(':celeritas-common').sourceSets.main.output.classesDirs
        ]
        def owners = [:]
        def duplicates = []

        componentOutputs.each { component, outputDirs ->
            outputDirs.files.findAll { it.exists() }.each { outputDir ->
                fileTree(outputDir).matching { include '**/*.class' }.files.each { classFile ->
                    def relativePath = outputDir.toPath().relativize(classFile.toPath()).toString().replace('\\', '/')
                    def previousOwner = owners.putIfAbsent(relativePath, component)
                    if (previousOwner != null && previousOwner != component) {
                        duplicates.add("${relativePath} (${previousOwner}, ${component})")
                    }
                }
            }
        }

        if (!duplicates.isEmpty()) {
            throw new GradleException("Duplicate classes cross module boundaries:\n - ${duplicates.sort().join('\n - ')}")
        }
    }
}

tasks.named('check').configure {
    dependsOn verifyRemapJar
    dependsOn verifyModuleBoundaries
}

apply from: 'gradle/scripts/publishing.gradle'
apply from: 'gradle/scripts/extra.gradle'
